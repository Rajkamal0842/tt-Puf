# Tiny Tapeout project information
project:
  title:        "Ring Oscillator PUF"
  author:       "Rajkamal"
  discord:      ""
  description:  "A 64-RO Physical Unclonable Function generating a unique 1-bit response per challenge using silicon manufacturing variation"
  language:     "Verilog"
  clock_hz:     50000000
  tiles: "1x1"
  top_module:  "tt_um_puf"
  source_files:
    - "project.v"

pinout:
  # Inputs
  ui[0]: "Challenge bit 0 (RO_A select bit 0)"
  ui[1]: "Challenge bit 1 (RO_A select bit 1)"
  ui[2]: "Challenge bit 2 (RO_A select bit 2)"
  ui[3]: "Challenge bit 3 (RO_A select bit 3)"
  ui[4]: "Challenge bit 4 (RO_A/B select bit 4)"
  ui[5]: "Challenge bit 5 (bank select)"
  ui[6]: "Challenge bit 6 (unused)"
  ui[7]: "Challenge bit 7 (unused)"
  # Outputs
  uo[0]: "PUF response bit (1 = RO_A faster)"
  uo[1]: "Done flag (pulses high when result ready)"
  uo[2]: "XOR entropy bit 0 (debug)"
  uo[3]: "XOR entropy bit 1 (debug)"
  uo[4]: "XOR entropy bit 2 (debug)"
  uo[5]: "XOR entropy bit 3 (debug)"
  uo[6]: "XOR entropy bit 4 (debug)"
  uo[7]: "XOR entropy bit 5 (debug)"
  # Bidirectional (unused)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
