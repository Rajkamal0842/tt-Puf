project:
  title: "Differential RO-PUF Security Core"
  description: "A Hardware Security Primitive using phase comparison of Ring Oscillators to generate unique silicon signatures."
  author: "RAJKAMAL NEMALIPURI"
  how_it_works: "Two identical ring oscillators are XORed. Process variation causes tiny frequency differences, creating a unique bit."
  how_to_test: "Enable the PUF using uio[0] and observe the oscillating response on uo[0]."
  language: "Verilog"
  clock_hz: 50000000
  device: "sky130"
  
