# Tiny Tapeout project information
project:
  title:        "Ring Oscillator PUF"
  author:       "Rajkamal"
  discord:      ""
  description:  "A 32-RO Physical Unclonable Function that generates a unique 1-bit response per challenge using silicon manufacturing variation"
  language:     "Verilog"
  clock_hz:     50000000   # 50 MHz
  tiles: "1x1"
  top_module:  "tt_um_puf"
  source_files:
    - "project.v"

# The pinout of your project.
pinout:
  # Inputs
  ui[0]: "Challenge bit 0 (RO_A select, LSB)"
  ui[1]: "Challenge bit 1 (RO_A select)"
  ui[2]: "Challenge bit 2 (RO_A select)"
  ui[3]: "Challenge bit 3 (RO_A select, MSB)"
  ui[4]: "Challenge bit 4 (RO_B select, LSB)"
  ui[5]: "Challenge bit 5 (RO_B select)"
  ui[6]: "Challenge bit 6 (RO_B select)"
  ui[7]: "Challenge bit 7 (RO_B select, MSB)"
  # Outputs
  uo[0]: "PUF response bit"
  uo[1]: "Done / result-valid flag"
  uo[2]: "Counter A debug bit 4"
  uo[3]: "Counter A debug bit 5"
  uo[4]: "Counter A debug bit 6"
  uo[5]: "Counter A debug bit 7"
  uo[6]: "Counter A debug bit 8"
  uo[7]: "Counter A debug bit 9"
  # Bidirectional pins (unused)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
