# Tiny Tapeout project information
project:
  title:        "Ring Oscillator PUF"
  author:       "Rajkamal"
  discord:      ""
  description:  "16-RO PUF with CRC32 accumulator and LFSR scrambler. Outputs 8-bit challenge-response for hardware authentication."
  language:     "Verilog"
  clock_hz:     50000000
  tiles: "1x1"
  top_module:  "tt_um_puf"
  source_files:
    - "project.v"

pinout:
  # Inputs
  ui[0]: "Challenge bit 0 (RO_A select LSB)"
  ui[1]: "Challenge bit 1 (RO_A select)"
  ui[2]: "Challenge bit 2 (RO_A select)"
  ui[3]: "Challenge bit 3 (RO_A select MSB)"
  ui[4]: "Challenge bit 4 (RO_B select LSB)"
  ui[5]: "Challenge bit 5 (RO_B select)"
  ui[6]: "Challenge bit 6 (RO_B select)"
  ui[7]: "Challenge bit 7 (RO_B select MSB)"
  # Outputs
  uo[0]: "PUF response bit (challenge-selected pair)"
  uo[1]: "Done flag (pulses high when result ready)"
  uo[2]: "Fixed pair 0 response XOR LFSR"
  uo[3]: "Fixed pair 1 response XOR LFSR"
  uo[4]: "Fixed pair 2 response XOR LFSR"
  uo[5]: "Fixed pair 3 response XOR LFSR"
  uo[6]: "CRC32 entropy bit 0"
  uo[7]: "CRC32 entropy bit 1"
  # Bidirectional (unused)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
