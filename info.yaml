# Tiny Tapeout project information
project:
  title:        "Ring Oscillator PUF"
  author:       "Rajkamal"
  discord:      ""
  description:  "8-pair Ring Oscillator PUF with 64 ROs and parallel evaluation. Outputs 8 independent PUF response bits per challenge."
  language:     "Verilog"
  clock_hz:     50000000
  tiles: "1x1"
  top_module:  "tt_um_puf"
  source_files:
    - "project.v"

pinout:
  # Inputs
  ui[0]: "Challenge bit 0"
  ui[1]: "Challenge bit 1"
  ui[2]: "Challenge bit 2"
  ui[3]: "Challenge bit 3"
  ui[4]: "Challenge bit 4"
  ui[5]: "Challenge bit 5 (bank select)"
  ui[6]: "Unused"
  ui[7]: "Unused"
  # Outputs
  uo[0]: "PUF response bit 0 (fixed pair 0)"
  uo[1]: "PUF response bit 1 (fixed pair 1)"
  uo[2]: "PUF response bit 2 (fixed pair 2)"
  uo[3]: "PUF response bit 3 (fixed pair 3)"
  uo[4]: "PUF response bit 4 (fixed pair 4)"
  uo[5]: "PUF response bit 5 (fixed pair 5)"
  uo[6]: "PUF response bit 6 (fixed pair 6)"
  uo[7]: "Challenge response XOR done flag"
  # Bidirectional (unused)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
