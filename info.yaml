project:
  title:        "16-Element RO-PUF"
  author:       "Rajkamal, Raj Kumar, Harish Naidu"
  discord:      ""
  description:  "A Hardware Security Primitive using Ring Oscillators"
  language:     "Verilog"
  clock_hz:     50000000
  source_files:
    - "project.v"

# How many tiles your design occupies? A single tile is about 167x108 uM.
tiles: "1x1"

# Your top module name
top_module:  "tt_um_puf"

# Pinout configuration
pinout:
  ui[0]: "RO_A Sel 0"
